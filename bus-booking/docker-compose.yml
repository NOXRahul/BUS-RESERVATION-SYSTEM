version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: busbooking_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: busbooking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: busbooking_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: production
    container_name: busbooking_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app  # hot reload in development only
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
      "

  # ── Celery worker ────────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      target: production
    container_name: busbooking_celery
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app worker
        --loglevel=info
        --queues=emails,bookings
        --concurrency=4

  # ── Celery Beat (scheduled tasks) ────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      target: production
    container_name: busbooking_beat
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app beat --loglevel=info

  # ── Flower (Celery monitoring) ────────────────────────────────────────────────
  flower:
    build:
      context: .
      target: production
    container_name: busbooking_flower
    restart: unless-stopped
    env_file: .env
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: >
      celery -A app.workers.celery_app flower
        --port=5555
        --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-secret}

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: busbooking_network
